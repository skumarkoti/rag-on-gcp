groups:
  - name: rag_alerts
    interval: 30s
    rules:

      # ── Availability ────────────────────────────────────────────────────────
      - alert: RAGAppDown
        expr: up{job="rag_app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "RAG application is down"
          description: "The RAG application has been unreachable for more than 1 minute."

      # ── Query Latency ────────────────────────────────────────────────────────
      - alert: HighQueryLatency
        expr: histogram_quantile(0.95, rate(rag_query_duration_seconds_bucket[5m])) > 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High P95 query latency ({{ $value | humanizeDuration }})"
          description: "95th percentile query latency exceeded 15 seconds for 5 minutes."

      - alert: CriticalQueryLatency
        expr: histogram_quantile(0.95, rate(rag_query_duration_seconds_bucket[5m])) > 30
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical P95 query latency ({{ $value | humanizeDuration }})"
          description: "95th percentile query latency exceeded 30 seconds."

      # ── Error Rate ───────────────────────────────────────────────────────────
      - alert: HighQueryErrorRate
        expr: |
          rate(rag_query_requests_total{status="failure"}[5m])
          / rate(rag_query_requests_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Query error rate above 10%"
          description: "{{ $value | humanizePercentage }} of queries are failing."

      - alert: HighDocumentProcessingErrors
        expr: |
          rate(rag_documents_uploaded_total{status="failure"}[15m])
          / rate(rag_documents_uploaded_total[15m]) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Document processing error rate above 20%"
          description: "{{ $value | humanizePercentage }} of document uploads are failing."

      # ── LLM ──────────────────────────────────────────────────────────────────
      - alert: LLMHighLatency
        expr: histogram_quantile(0.95, rate(rag_llm_duration_seconds_bucket[5m])) > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LLM P95 latency is high ({{ $value | humanizeDuration }})"

      - alert: LLMErrors
        expr: rate(rag_llm_requests_total{status="failure"}[5m]) > 0.1
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "LLM API is returning errors"
          description: "{{ $value }} LLM failures per second."

      # ── Document Processing ──────────────────────────────────────────────────
      - alert: DocumentProcessingStuck
        expr: rag_document_processing_in_progress > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Many documents stuck in processing ({{ $value }})"
          description: "More than 5 documents have been in processing state for 10+ minutes."
